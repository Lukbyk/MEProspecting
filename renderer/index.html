<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecting · Media Energetyczne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7F9; --surface:#FFFFFF; --surface-2:#FBFCFD;
    --line:#E6E9EF; --line-2:#EEF1F5;
    --ink:#18212F; --muted:#707A8A; --muted-2:#9AA3B0;
    --teal:#0E7C7B; --teal-d:#0A615F; --teal-tint:#E7F2F1;
    /* statusy firmy */
    --s-nowa:#5B6B8C; --s-napoczeta:#C8881A; --s-wyczerpana:#9AA3B0;
    --s-wgrze:#1F9D6B; --s-klient:#B7791F; --s-blok:#B4452E;
    /* kontaktowalność */
    --c-a:#1F9D6B; --c-b:#3D6BD6; --c-c:#9AA3B0; --c-d:#C8881A;
    --shadow:0 1px 2px rgba(24,33,47,.04),0 4px 16px rgba(24,33,47,.06);
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;display:flex;height:100vh;overflow:hidden}
  .mono{font-family:'IBM Plex Mono',monospace}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.13em;
    text-transform:uppercase;color:var(--muted-2);font-weight:500}

  /* ── SIDEBAR ── */
  .sidebar{width:232px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:18px 14px}
  .brand{padding:6px 8px 18px;border-bottom:1px solid var(--line-2);margin-bottom:14px}
  .brand .nm{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:1px}
  .brand .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-right:7px;vertical-align:middle}
  .nav-label{padding:4px 8px;margin:10px 0 4px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;cursor:pointer;
    color:var(--muted);font-weight:500;font-size:13.5px;transition:.12s}
  .nav-item:hover{background:var(--surface-2);color:var(--ink)}
  .nav-item.on{background:var(--teal-tint);color:var(--teal-d);font-weight:600}
  .nav-item .ic{width:17px;height:17px;flex-shrink:0;opacity:.85}
  .nav-item .ct{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
    background:var(--line-2);color:var(--muted);padding:1px 6px;border-radius:20px;font-weight:500}
  .nav-item.on .ct{background:#fff;color:var(--teal-d)}
  .side-foot{margin-top:auto;padding:10px 8px;font-size:11px;color:var(--muted-2);border-top:1px solid var(--line-2)}

  /* ── MAIN ── */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{padding:18px 26px 14px;border-bottom:1px solid var(--line);background:var(--surface)}
  .topbar h1{font-size:18px;font-weight:700;letter-spacing:-.015em}
  .topbar p{color:var(--muted);font-size:12.5px;margin-top:2px}
  .filters{display:flex;gap:8px;align-items:center;padding:12px 26px;background:var(--surface);
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  select,.toggle{font-family:Inter,sans-serif;font-size:12.5px;color:var(--ink);background:var(--surface);
    border:1px solid var(--line);border-radius:7px;padding:6px 10px;cursor:pointer;outline:none;transition:.12s}
  select:hover,.toggle:hover{border-color:var(--muted-2)}
  select:focus{border-color:var(--teal)}
  .toggle{display:flex;align-items:center;gap:7px;user-select:none}
  .toggle.on{background:var(--teal-tint);border-color:var(--teal);color:var(--teal-d);font-weight:500}
  .toggle .box{width:14px;height:14px;border:1.5px solid var(--muted-2);border-radius:4px;display:grid;place-items:center}
  .toggle.on .box{background:var(--teal);border-color:var(--teal)}
  .toggle.on .box::after{content:'';width:7px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-2px}
  .filt-spacer{margin-left:auto;font-size:12px;color:var(--muted)}
  .content{flex:1;overflow-y:auto;padding:6px 26px 90px}

  /* ── TABLE / ROWS ── */
  .thead{display:grid;gap:14px;padding:10px 12px 8px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:2}
  .thead .eyebrow{font-size:10px}
  .row{display:grid;gap:14px;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line-2);
    cursor:pointer;transition:.1s;border-radius:8px}
  .row:hover{background:var(--surface)}
  .row.sel{background:var(--teal-tint)}
  /* people grid */
  .g-people{grid-template-columns:26px 1.6fr 1.5fr 70px 1fr 110px}
  /* firms grid */
  .g-firms{grid-template-columns:1.7fr 130px 70px 70px 80px 1fr}
  .g-base{grid-template-columns:1.5fr 1.35fr 58px 92px 1fr 172px}
  .g-campaign{grid-template-columns:1.25fr 1.25fr 112px 1.15fr 64px 1fr 128px}
  .access-sel{font-size:11.5px;padding:5px 8px;max-width:168px;width:100%}

  .dash-head{display:grid;grid-template-columns:minmax(240px,1.25fr) 2fr;gap:14px;margin:12px 0 14px}
  .campaign-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px}
  .campaign-card .nm{font-weight:700;font-size:15px;letter-spacing:-.01em}
  .campaign-card .meta{font-size:12px;color:var(--muted);margin-top:4px}
  .campaign-card .goal{font-size:12.5px;color:var(--ink);margin-top:10px;line-height:1.35}
  .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 13px;min-width:0}
  .stat .v{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;line-height:1;color:var(--ink)}
  .stat .l{font-size:11px;color:var(--muted);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-strip{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 10px}
  .status-chip{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
    border-radius:8px;padding:6px 9px;font-size:12px;color:var(--muted)}
  .status-chip b{font-family:'IBM Plex Mono',monospace;color:var(--ink);font-size:12px}
  .row-actions{display:flex;gap:6px;justify-content:flex-end}
  .row-actions .mini{padding:5px 8px;font-size:11px}
  .stage .nm{font-weight:600;font-size:12px;color:var(--ink)}
  .stage .dt{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted-2);margin-top:2px}

  .ck{width:17px;height:17px;border:1.6px solid var(--muted-2);border-radius:5px;display:grid;place-items:center;
    cursor:pointer;flex-shrink:0;transition:.1s;background:#fff}
  .ck:hover{border-color:var(--teal)}
  .ck.on{background:var(--teal);border-color:var(--teal)}
  .ck.on::after{content:'';width:8px;height:4.5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-2px}

  .person .nm{font-weight:600;font-size:13.5px}
  .person .ti{font-size:11.5px;color:var(--muted);margin-top:1px}
  .firm-cell .nm{font-weight:600;font-size:13.5px;line-height:1.25}
  .firm-cell .meta{font-size:11px;color:var(--muted);margin-top:2px}
  .email{font-size:12px;color:var(--muted)}
  .email .anchor{color:var(--s-napoczeta)}

  /* contactability dot */
  .cdot{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;font-weight:600}
  .cdot i{width:8px;height:8px;border-radius:50%;display:inline-block}
  .cA i{background:var(--c-a)} .cB i{background:var(--c-b)} .cC i{background:var(--c-c)} .cD i{background:var(--c-d)}
  .cA{color:var(--c-a)} .cB{color:var(--c-b)} .cC{color:var(--c-c)} .cD{color:var(--c-d)}

  /* status pill */
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:3px 9px 3px 8px;border-radius:30px;white-space:nowrap}
  .pill i{width:6px;height:6px;border-radius:50%}
  .p-nowa{background:#EEF1F6;color:var(--s-nowa)} .p-nowa i{background:var(--s-nowa)}
  .p-napoczeta{background:#FBF1DF;color:#9A6610} .p-napoczeta i{background:var(--s-napoczeta)}
  .p-wyczerpana{background:#F0F2F4;color:#6B7480} .p-wyczerpana i{background:var(--s-wyczerpana)}
  .p-wgrze{background:#E3F5EC;color:#157A50} .p-wgrze i{background:var(--s-wgrze)}
  .p-klient{background:#FBF0D8;color:#8A5A0F} .p-klient i{background:var(--s-klient)}
  .p-blok{background:#F8E7E2;color:#9A3A28} .p-blok i{background:var(--s-blok)}
  /* person status (small) */
  .st{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);font-weight:500}
  .st b{color:var(--ink);font-weight:600}

  .reserve{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px}
  .reserve.zero{color:var(--muted-2)} .reserve.has{color:var(--s-napoczeta)}
  .num{font-family:'IBM Plex Mono',monospace;font-size:13px;text-align:center}
  .badge-flag{font-size:10px;font-family:'IBM Plex Mono',monospace;background:#FBF1DF;color:#9A6610;
    padding:1px 6px;border-radius:5px;font-weight:600;margin-left:6px}
  .warn{color:var(--s-napoczeta);font-weight:600}

  /* ── BULK BAR ── */
  .bulkbar{position:fixed;bottom:0;left:232px;right:0;background:var(--ink);color:#fff;
    padding:13px 26px;display:none;align-items:center;gap:16px;box-shadow:0 -4px 20px rgba(0,0,0,.12);z-index:20}
  .bulkbar.show{display:flex}
  .bulkbar .cnt{font-weight:600;font-size:14px}
  .bulkbar .cnt b{font-family:'IBM Plex Mono',monospace;background:rgba(255,255,255,.16);padding:2px 9px;border-radius:6px;margin-right:4px}
  .bulkbar .sp{margin-left:auto;display:flex;gap:10px}
  .btn{font-family:Inter,sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;
    border:none;cursor:pointer;transition:.12s}
  .btn:disabled{opacity:.32;cursor:not-allowed;pointer-events:none}
  .btn-primary{background:var(--teal);color:#fff} .btn-primary:hover{background:var(--teal-d)}
  .btn-ghost{background:transparent;color:#C4CBD4;border:1px solid rgba(255,255,255,.18)} .btn-ghost:hover{color:#fff;border-color:rgba(255,255,255,.4)}

  /* ── DETAIL PANEL ── */
  .scrim{position:fixed;inset:0;background:rgba(24,33,47,.28);opacity:0;pointer-events:none;transition:.18s;z-index:30}
  .scrim.show{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;height:100vh;width:560px;max-width:92vw;background:var(--bg);
    border-left:1px solid var(--line);transform:translateX(100%);transition:transform .24s cubic-bezier(.4,0,.2,1);
    z-index:31;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(24,33,47,.1)}
  .panel.show{transform:translateX(0)}
  .panel-head{padding:20px 24px 16px;background:var(--surface);border-bottom:1px solid var(--line)}
  .panel-head .x{float:right;cursor:pointer;color:var(--muted-2);font-size:20px;line-height:1;padding:2px 6px;border-radius:6px}
  .panel-head .x:hover{background:var(--line-2);color:var(--ink)}
  .panel-head h2{font-size:18px;font-weight:700;letter-spacing:-.01em;margin-top:4px}
  .panel-head .h-meta{color:var(--muted);font-size:12.5px;margin-top:3px}
  .panel-body{flex:1;overflow-y:auto;padding:20px 24px 40px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
  .card h3{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;
    font-family:'IBM Plex Mono',monospace}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:6px 12px;font-size:13px}
  .kv dt{color:var(--muted)} .kv dd{font-weight:500}
  .kv dd.mono{font-family:'IBM Plex Mono',monospace;font-size:12.5px}

  .cand{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2)}
  .cand:last-child{border-bottom:none}
  .cand .info{flex:1;min-width:0}
  .cand .info .nm{font-weight:600;font-size:13px}
  .cand .info .ti{font-size:11.5px;color:var(--muted)}
  .cand .info .em{font-size:11.5px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;margin-top:1px}
  .cact{display:flex;gap:6px}
  .mini{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:7px;border:1px solid var(--line);
    background:#fff;cursor:pointer;color:var(--ink);transition:.12s;white-space:nowrap}
  .mini:hover{border-color:var(--muted-2)}
  .mini.go{background:var(--teal);color:#fff;border-color:var(--teal)} .mini.go:hover{background:var(--teal-d)}
  .mini.danger:hover{border-color:var(--s-blok);color:var(--s-blok)}
  .mini.on{background:var(--teal-tint);border-color:var(--teal);color:var(--teal-d)}

  /* timeline */
  .tl{position:relative;padding-left:20px}
  .tl::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl-item{position:relative;padding:0 0 16px}
  .tl-item:last-child{padding-bottom:0}
  .tl-item::before{content:'';position:absolute;left:-18px;top:4px;width:9px;height:9px;border-radius:50%;
    background:var(--surface);border:2px solid var(--teal)}
  .tl-item .ev{font-weight:600;font-size:13px}
  .tl-item .dt{font-size:11px;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;margin-top:1px}
  .tl-item .by{font-size:11px;color:var(--muted)}
  .by-ai{color:var(--teal-d)} .by-op{color:#8A5A0F}

  /* toast */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast .ok{color:#4ADE9A;font-weight:700}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty .big{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .hint{font-size:11.5px;color:var(--muted-2);padding:14px 12px;font-style:italic}

  /* campaign chip w kolejce */
  .campchip{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;
    background:var(--teal-tint);color:var(--teal-d);padding:1px 6px;border-radius:5px;margin-top:3px;letter-spacing:.02em}
  /* modal wyboru kampanii */
  .mscrim{position:fixed;inset:0;background:rgba(24,33,47,.42);opacity:0;pointer-events:none;transition:.16s;z-index:40}
  .mscrim.show{opacity:1;pointer-events:auto}
  .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-48%) scale(.98);opacity:0;pointer-events:none;
    width:520px;max-width:94vw;max-height:86vh;background:var(--surface);border-radius:14px;z-index:41;
    display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(24,33,47,.28);transition:.18s}
  .modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .modal-head{padding:20px 22px 14px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-top:3px}
  .modal-head p{color:var(--muted);font-size:12.5px;margin-top:4px}
  .modal-head p b{color:var(--ink);font-family:'IBM Plex Mono',monospace}
  .modal-body{padding:14px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
  .btn-flat{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:13px;
    padding:8px 16px;border-radius:8px;cursor:pointer}
  .btn-flat:hover{border-color:var(--muted-2);color:var(--ink)}
  .camp-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.12s}
  .camp-opt:hover{border-color:var(--muted-2)}
  .camp-opt.on{border-color:var(--teal);background:var(--teal-tint)}
  .camp-opt.new{border-style:dashed}
  .radio{width:17px;height:17px;border-radius:50%;border:2px solid var(--muted-2);flex-shrink:0;display:grid;place-items:center;transition:.12s}
  .camp-opt.on .radio{border-color:var(--teal)}
  .radio.on::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--teal)}
  .co-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .co-nm{font-weight:600;font-size:13.5px}
  .co-meta{font-size:11px;color:var(--muted)}
  .co-status{align-self:flex-start;text-transform:capitalize}
  .newcamp{padding:6px 4px 2px;display:flex;flex-direction:column;gap:12px}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld>span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .fld input{font-family:Inter,sans-serif;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;outline:none;color:var(--ink)}
  .fld input:focus{border-color:var(--teal)}
  .fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .prop-strip{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--teal-tint);
    border:1px solid var(--teal);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.12s}
  .prop-strip:hover{box-shadow:0 2px 12px rgba(14,124,123,.16)}
  .ps-nm{font-weight:600;font-size:13.5px;color:var(--teal-d)}
  .ps-meta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .st-await{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#9A6610}
  .st-pending{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--muted-2);font-style:italic}
  .process-doc{max-width:980px;padding:20px 0 60px}
  .process-doc h1{font-size:24px;letter-spacing:-.02em;margin:8px 0 10px}
  .process-doc h2{font-size:17px;margin:26px 0 10px;padding-top:8px;border-top:1px solid var(--line)}
  .process-doc h3{font-size:14px;margin:18px 0 8px;color:var(--teal-d)}
  .process-doc p{font-size:13.5px;color:var(--ink);margin:8px 0;max-width:820px}
  .process-doc ul,.process-doc ol{margin:8px 0 12px 22px;color:var(--ink)}
  .process-doc li{font-size:13.5px;margin:5px 0}
  .process-doc code{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--line-2);padding:1px 5px;border-radius:5px}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand">
    <div class="nm"><span class="dot"></span>Media Energetyczne</div>
    <div class="sub">Baza prospectingowa · Blok 1</div>
  </div>
  <div class="nav-label eyebrow">Praca</div>
  <div class="nav-item on" data-view="people">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>
    Kolejka osób <span class="ct" id="nav-people">0</span>
  </div>
  <div class="nav-item" data-view="base">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
    Baza osób <span class="ct" id="nav-base">0</span>

  };
  return labels[row.event_type] || row.event_type;
}

      by: row.actor || 'system',
      dt: fmtDT(row.at)
    });
    return acc;
  },{});
}

  return {status:s, nPeople:ppl.length, nContacted, nAvail, nSel};

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function inlineMd(s){
  return escapeHtml(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}

function markdownToHtml(md){
  const lines=md.split(/\r?\n/);
  let html='', list=null;
  const closeList=()=>{if(list){html+=`</${list}>`;list=null;}};
  lines.forEach(line=>{
    const t=line.trim();
    if(!t){closeList(); return;}
    if(t.startsWith('### ')){closeList(); html+=`<h3>${inlineMd(t.slice(4))}</h3>`; return;}
    if(t.startsWith('## ')){closeList(); html+=`<h2>${inlineMd(t.slice(3))}</h2>`; return;}
    if(t.startsWith('# ')){closeList(); html+=`<h1>${inlineMd(t.slice(2))}</h1>`; return;}
    if(/^[-*] /.test(t)){
      if(list!=='ul'){closeList(); list='ul'; html+='<ul>';}
      html+=`<li>${inlineMd(t.slice(2))}</li>`;
      return;
    }
    const numbered=t.match(/^\d+\.\s+(.*)$/);
    if(numbered){
      if(list!=='ol'){closeList(); list='ol'; html+='<ol>';}
      html+=`<li>${inlineMd(numbered[1])}</li>`;
      return;
    }
    closeList();
    html+=`<p>${inlineMd(t)}</p>`;
  });
  closeList();
  return html;
}

function statusCounts(list){
  return list.reduce((acc,p)=>{acc[p.status]=(acc[p.status]||0)+1;return acc;},{});
}

function statusSummary(list){
  const counts=statusCounts(list);
  const order=['awaiting_selection','selected','rejected','sent','replied','qualified','booked','won','lost','nurture','enriched','sourced','suppressed'];
  return order.filter(s=>counts[s]).map(s=>`<span class="status-chip"><b>${counts[s]}</b>${STATUS_PL[s]}</span>`).join('');
}

function campaignActions(p){
  if(p.status==='awaiting_selection'){

      <button class="mini danger" onclick="rejectOne(${p.id})">Wycofaj</button>
    </div>`;
  }
  if(['selected','sent'].includes(p.status)){
    return `<div class="row-actions" onclick="event.stopPropagation()">
      <button class="mini danger" onclick="rejectOne(${p.id})">Wycofaj</button>
    </div>`;
  }
  return '<span class="st-pending">—</span>';
}

function campaignStage(p){
  if(p.status==='awaiting_selection') return {name:'czeka na zatwierdzenie', dt:campNameShort(p.camp)};
  if(p.status==='selected') return {name:'gotowy do wysyłki', dt:campNameShort(p.camp)};
  if(p.status==='rejected') return {name:'wycofany z kampanii', dt:campNameShort(p.camp)};
  if(p.status==='suppressed') return {name:'optout', dt:'koniec kontaktu'};

  const history=(events[p.id]||[]).filter(e=>!/^Zaimportowany/.test(e.ev) && !/^Znaleziony/.test(e.ev) && !/^Mail osobisty/.test(e.ev));
  const latest=history[history.length-1];
  if(latest) return {name:latest.ev, dt:latest.dt};

  if(p.status==='sent') return {name:'mail wysłany', dt:'czeka na reakcję'};
  if(p.status==='replied') return {name:'odpowiedź', dt:'do obsługi'};
  return {name:STATUS_PL[p.status], dt:'bez aktywności'};
}

/* ── BAZA OSÓB — pełna lista, sort po dacie dodania, zarządzanie dostępem do kampanii ── */
function fmtDT(s){
  if(!s)return'—';
  const sp=s.split(' ');
  const d=sp[0].split('-');
  if(sp[1] && sp[1].split(':').length===3){
    const dt=new Date(`${sp[0]}T${sp[1]}Z`);
    if(!Number.isNaN(dt.getTime())){
      const day=String(dt.getDate()).padStart(2,'0');
      const month=String(dt.getMonth()+1).padStart(2,'0');
      const hour=String(dt.getHours()).padStart(2,'0');
      const minute=String(dt.getMinutes()).padStart(2,'0');
      return `${day}.${month} ${hour}:${minute}`;
    }
  }
  const time=sp[1] ? sp[1].split(':').slice(0,2).join(':') : '';
  return `${d[2]}.${d[1]}${time?' '+time:''}`;
}
function miniStatus(p){
  if(p.ready && !p.camp) return '<span class="st"><b style="color:var(--teal-d)">gotowy od Analityka</b></span>';
  if(p.status==='awaiting_selection') return '<span class="st-await">do zatwierdzenia</span>';
  if(p.status==='suppressed') return '<span class="st">⛔ optout</span>';
  if(p.etype!=='personal' && !p.camp) return '<span class="st-pending">do wzbogacenia</span>';
  if(p.status==='sent') return '<span class="st"><b>wysłany</b></span>';
  if(p.status==='replied') return '<span class="st"><b style="color:var(--s-wgrze)">odpowiedział</b></span>';
  return `<span class="st">${STATUS_PL[p.status]}</span>`;
}
function accessControl(p){
  if(p.status==='suppressed') return '<span class="st-pending">—</span>';
  if(p.etype!=='personal' && !p.camp) return '<span class="st-pending">wymaga Apollo</span>';
  if(CONTACTED.includes(p.status))
    return `<span class="campchip">${campNameShort(p.camp)}</span> <span class="st" style="font-size:10px">w kontakcie</span>`;
  const opts=campaigns.map(c=>`<option value="${c.id}" ${p.camp==c.id?'selected':''}>${shortName(c.name)}</option>`).join('');
  return `<select class="access-sel" onchange="setCampaignAccess(${p.id},this.value)" onclick="event.stopPropagation()">
    <option value="" ${!p.camp?'selected':''}>— bez kampanii —</option>${opts}</select>`;
}
async function setCampaignAccess(id,val){
  const p=people.find(p=>p.id===id); if(!p)return;
  const c=val?campaigns.find(c=>c.id===+val):null;
  if(window.api){
    try{
      const r=await window.api.setCampaignAccess(id, val ? +val : null);
      if(r && r.ok===false) throw new Error(r.error||'zapis nieudany');
    }catch(err){
      console.error(err);
      toast(`Nie udało się zapisać — ${err?.message || 'sprawdź konsolę'}`);
      return;
    }
    await loadFromDatabase();          // baza źródłem prawdy — bez zgadywania statusu lokalnie
  } else if(val){
    p.camp=+val; p.sel=true;
    if(['sourced','enriched','awaiting_selection'].includes(p.status)) p.status='selected';
    if(c&&c.status==='zaproponowana')c.status='aktywna';
    (events[id]=events[id]||[]).push({ev:'Dostęp do kampanii: '+(c?c.name:''),by:'operator',dt:'dziś'});
  } else {
    p.camp=null; p.sel=false;
    if(['selected','awaiting_selection'].includes(p.status)) p.status=p.etype==='personal'?'enriched':'sourced';
    (events[id]=events[id]||[]).push({ev:'Usunięty z kampanii',by:'operator',dt:'dziś'});
  }
  toast(val?`<span class="ok">✓</span> ${escapeHtml(p.fn)} ${escapeHtml(p.ln)} → ${c?shortName(c.name):''}`
           :`${escapeHtml(p.fn)} ${escapeHtml(p.ln)} — bez kampanii`);
  render();
}

/* ── selekcja ── */
function toggleOne(id){selected.has(id)?selected.delete(id):selected.add(id);updateBulk();render();}
function toggleAll(ids){const all=ids.every(i=>selected.has(i));ids.forEach(i=>all?selected.delete(i):selected.add(i));updateBulk();render();}
function clearSel(){selected.clear();updateBulk();render();}
function updateBulk(){
  const bar=document.getElementById('bulkbar');
  document.getElementById('bulk-count').textContent=selected.size;
  const sel=[...selected].map(id=>people.find(p=>p.id===id)).filter(Boolean);
  // ile z zaznaczonych faktycznie da się potwierdzić / odrzucić
  const nConfirm=sel.filter(p=>p.status==='awaiting_selection'&&p.camp).length;
  const nReject =sel.filter(p=>p.camp&&['awaiting_selection','selected','sent'].includes(p.status)).length;
  const cb=document.getElementById('btn-confirm'), rb=document.getElementById('btn-reject');
  if(cb){cb.textContent=`✓ Potwierdź w kampanii${nConfirm?` (${nConfirm})`:''}`; cb.disabled=nConfirm===0;}
  if(rb){rb.textContent=`Wycofaj z kampanii${nReject?` (${nReject})`:''}`; rb.disabled=nReject===0;}
  if(selected.size>0){
    const firms=new Set(sel.map(p=>p.duns));
    document.getElementById('bulk-firms').textContent=`z ${firms.size} ${firms.size===1?'firmy':'firm'}`;
    bar.classList.add('show');
  } else bar.classList.remove('show');
}
/* ── kampanie: AI przypisuje kandydatów ze statusem „do zatwierdzenia”;
   operator potwierdza/odrzuca w KOLEJCE (bez osobnego dialogu) ── */
const NOW = new Date();   // realna „dziś" — liczniki dni nie zamarzają na sztywnej dacie
function fmtD(iso){if(!iso)return'—';const p=iso.split('-');return p[2]+'.'+p[1];}
function shortName(s){return escapeHtml((s||'').split('—')[0].trim().slice(0,18));}
function campNameShort(id){const c=campaigns.find(c=>c.id===id);return c?shortName(c.name):'';}
function daysLeftLabel(c){
  if(!c.to) return 'bez ramy';
  const diff=Math.round((new Date(c.to)-NOW)/86400000);
  if(c.status==='zaproponowana'){const d2=Math.round((new Date(c.from)-NOW)/86400000);return d2>0?`start za ${d2} dni`:'gotowa do startu';}
  if(diff>0) return `kończy się za ${diff} dni`;
  if(diff===0) return 'kończy się dziś';
  return `rama minęła ${-diff} dni temu`;
}

/* status w kolejce: „do zatwierdzenia" + kampania / status + kampania / sam status */
function statusCell(p){
  if(p.status==='awaiting_selection' && p.camp)
    return `<span class="st-await">do zatwierdzenia</span><span class="campchip" style="display:block;margin-top:3px">${campNameShort(p.camp)}</span>`;
  // niegotowy: brak maila osobistego i poza kampanią → czeka na Apollo
  if(p.etype!=='personal' && !p.camp && p.status!=='suppressed')
    return `<span class="st-pending">do wzbogacenia · Apollo</span>`;
  const base = p.status==='sent'?'<b>wysłany</b>'
    : p.status==='replied'?'<b style="color:var(--s-wgrze)">odpowiedział</b>'
    : STATUS_PL[p.status];
  if(p.camp) return `<span class="st">${base}</span><span class="campchip" style="display:block;margin-top:3px">${campNameShort(p.camp)}</span>`;
  return `<span class="st">${base}</span>`;
}

async function saveRejectCampaignPerson(p){

    try{
      const r=await window.api.rejectCampaignPerson(p.id);
      if(r && r.ok===false) throw new Error(r.error||'zapis nieudany');
      return;
    }catch(err){
      if(!String(err?.message || '').includes('No handler registered')) throw err;
    }
  }
  if(window.api.setCampaignAccess) await window.api.setCampaignAccess(p.id, null);
}

/* potwierdzanie / wycofywanie propozycji AI — bulk w kolejce */
async function confirmSel(){
  const ids=[...selected].filter(id=>{const p=people.find(p=>p.id===id);return p&&p.status==='awaiting_selection'&&p.camp;});
  if(ids.length===0){toast('Zaznacz osoby „do zatwierdzenia"');return;}
  try{
    await Promise.all(ids.map(id=>saveConfirmCampaignPerson(people.find(p=>p.id===id))));
  }catch(err){
    console.error(err);
    toast(`Nie udało się zapisać potwierdzenia — ${err?.message || 'sprawdź konsolę'}`);
    return;
  }
  if(window.api){
    await loadFromDatabase();
  }else{
    const camps=new Set();
    ids.forEach(id=>{const p=people.find(p=>p.id===id);p.status='selected';p.sel=true;camps.add(p.camp);
      (events[id]=events[id]||[]).push({ev:'Potwierdzony w kampanii',by:'operator',dt:'dziś'});});
    camps.forEach(cid=>{const c=campaigns.find(c=>c.id===cid);if(c&&c.status==='zaproponowana')c.status='aktywna';});
  }
  selected.clear();updateBulk();render();
  toast(`<span class="ok">✓</span> Potwierdzono <b>${ids.length}</b> ${ids.length===1?'osobę':'osób'} w kampanii`);
}
async function rejectSel(){
  const ids=[...selected].filter(id=>{const p=people.find(p=>p.id===id);return p&&p.camp&&['awaiting_selection','selected','sent'].includes(p.status);});
  if(ids.length===0){toast('Zaznacz osoby przypisane do kampanii');return;}
  try{
    await Promise.all(ids.map(id=>saveRejectCampaignPerson(people.find(p=>p.id===id))));
  }catch(err){
    console.error(err);
    toast(`Nie udało się zapisać wycofania — ${err?.message || 'sprawdź konsolę'}`);
    return;
  }
  if(window.api){
    await loadFromDatabase();
  }else{
    ids.forEach(id=>rejectOne(id,true));
  }
  selected.clear();updateBulk();render();
  toast(`Wycofano <b>${ids.length}</b> z kampanii — rekordy zostają w dashboardzie`);
}
/* pojedyncze akcje w kartach firmy/osoby */
async function confirmOne(id){
  const p=people.find(p=>p.id===id); if(!p||p.status!=='awaiting_selection')return;
  try{
    await saveConfirmCampaignPerson(p);
  }catch(err){
    console.error(err);
    toast(`Nie udało się zapisać potwierdzenia — ${err?.message || 'sprawdź konsolę'}`);
    return;
  }
  if(window.api){
    await loadFromDatabase();
  }else{
    p.status='selected';p.sel=true;
    const c=campaigns.find(c=>c.id===p.camp); if(c&&c.status==='zaproponowana')c.status='aktywna';
    (events[id]=events[id]||[]).push({ev:'Potwierdzony w kampanii',by:'operator',dt:'dziś'});
  }
  toast(`<span class="ok">✓</span> ${escapeHtml(p.fn)} ${escapeHtml(p.ln)} — w kampanii`); refreshOpenPanel(id,p.duns); render();
}
async function rejectOne(id,bulk){
  const p=people.find(p=>p.id===id); if(!p)return; p.sel=false;
  if(window.api && !bulk){
    try{
      await saveRejectCampaignPerson(p);
    }catch(err){
      console.error(err);
      toast(`Nie udało się zapisać wycofania — ${err?.message || 'sprawdź konsolę'}`);
      return;
    }
    await loadFromDatabase();
  }else{
    p.status='rejected';
    (events[id]=events[id]||[]).push({ev:'Wycofany z kampanii',by:'operator',dt:'dziś'});
  }
  if(!bulk){toast(`${escapeHtml(p.fn)} ${escapeHtml(p.ln)} — wycofany, zostaje w kampanii jako odrzucony`); refreshOpenPanel(id,p.duns); render();}
}

/* (dialog propozycji usunięty — potwierdzanie odbywa się w kolejce) */

/* ── panele ── */

          ${p.camp?(()=>{const cc=campaigns.find(x=>x.id===p.camp);return cc?`<dt>Kampania</dt><dd>${escapeHtml(cc.name)}</dd><dt>Okno</dt><dd class="mono">${fmtD(cc.from)}–${fmtD(cc.to)} · <span class="warn">${daysLeftLabel(cc)}</span></dd>`:'';})():''}
        </dl>
        <div class="cact" style="margin-top:14px">
          ${p.status==='suppressed'?'<span class="st">⛔ na optout — koniec kontaktu</span>'

    <div class="panel-head">
      <span class="x" onclick="closePanel()">×</span>

      <h2>${escapeHtml(c.name)}</h2>
      <div class="h-meta">${escapeHtml(c.city)} · ${escapeHtml(c.industry)} <span class="pill ${cls}" style="margin-left:8px"><i></i>${lab}</span></div>
    </div>
    <div class="panel-body">
      ${c.branch?`<div class="card" style="border-color:var(--s-napoczeta);background:#FEFBF4"><h3 style="color:#9A6610">⚑ Możliwy oddział — decyzja operatora</h3>
        <div style="font-size:13px;color:var(--ink)">Ta sama nazwa pod innym numerem DUNS. Czy to osobny cel (jedna osoba per oddział) czy ten sam podmiot? System nie scala automatycznie — czeka na Twoją decyzję.</div>
        <div class="cact" style="margin-top:12px"><button class="mini">Osobny cel</button><button class="mini">Scal z centralą</button></div></div>`:''}
      <div class="card"><h3>Dane firmy</h3>
        <dl class="kv">

          <dt>Region</dt><dd>${escapeHtml(c.region)}</dd>
          <dt>Przychód</dt><dd class="mono">${c.sales? c.sales+'k EUR':'—'}</dd>
          <dt>Zatrudnienie</dt><dd class="mono">${c.emp??'—'} ${!c.empOk&&c.sales?'<span class="warn">⚠ niepewne</span>':''}</dd>
          <dt>Branża</dt><dd>${escapeHtml(c.industry)}</dd>
        </dl>
      </div>
      <div class="card"><h3>Kandydaci w firmie · ${ppl.length}</h3>
        ${ppl.map(p=>`<div class="cand">
          <span class="cdot c${p.c}" title="kontaktowalność ${p.c}"><i></i></span>
          <div class="info"><div class="nm">${escapeHtml(p.fn)} ${escapeHtml(p.ln)} ${p.anchor?'<span class="st">· kotwica D&B</span>':''}</div>
            <div class="ti">${escapeHtml(p.title)}${p.icp?' · '+escapeHtml(p.icp):''}</div>
            <div class="em">${p.email?escapeHtml(p.email):'— brak maila, do Apollo —'}</div></div>
          <div class="cact">
            <span class="st" style="align-self:center">${p.status==='awaiting_selection'?'<span class="st-await">do zatwierdzenia</span>':p.status==='suppressed'?'⛔ optout':p.status==='sent'?'wysłany':p.status==='replied'?'<b style="color:var(--s-wgrze)">odpowiedział</b>':STATUS_PL[p.status]}</span>
            ${p.status==='awaiting_selection'?`<button class="mini go" onclick="confirmOne(${p.id})" title="potwierdź w kampanii">✓</button><button class="mini danger" onclick="rejectOne(${p.id})" title="wycofaj z kampanii">−</button>`:''}
          </div></div>`).join('')}
        ${ppl.filter(p=>AVAILABLE.includes(p.status)&&!p.optout).length===0?'<div class="hint">Brak kandydatów w rezerwie — firma wyczerpana. Apollo może dorobić nowych wg ICP.</div>':''}
      </div>

  showPanel();
}

function quickOptout(id){const p=people.find(p=>p.id===id);p.optout=true;p.status='suppressed';p.sel=false;selected.delete(id);
  (events[id]=events[id]||[]).push({ev:'Optout — ręczny',by:'operator',dt:'dziś'});
  toast(`⛔ ${escapeHtml(p.fn)} ${escapeHtml(p.ln)} — optout, koniec kontaktu`);updateBulk();openPerson(id);render();}

function showPanel(){document.getElementById('scrim').classList.add('show');document.getElementById('panel').classList.add('show');}
function closePanel(){document.getElementById('scrim').classList.remove('show');document.getElementById('panel').classList.remove('show');}

let toastT;
function toast(html){const t=document.getElementById('toast');t.innerHTML=html;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

/* nav */
document.querySelectorAll('.nav-item[data-view]').forEach(n=>n.onclick=()=>{view=n.dataset.view;closePanel();render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});

async function init(){
  if(window.api?.dbPath){
    try{
      currentDbPath = await window.api.dbPath();
      const foot=document.getElementById('db-path-foot');
      if(foot) foot.textContent = currentDbPath;
    }catch(err){ console.warn(err); }
  }
  try{
    await loadFromDatabase();
  }catch(err){
    console.error(err);
    if(window.api){
      // api jest, ale odczyt padł → pokazujemy PUSTO + błąd, nie zmyślone dane demo
      companies=[]; people=[]; campaigns=[]; events={};
      toast(`Nie udało się wczytać bazy — ${err?.message || 'sprawdź konsolę'}`);
    }else{
      toast('Tryb demo — brak połączenia z bazą');
    }
  }
  try{
    try{
      if(window.api?.processDoc) processDoc = await window.api.processDoc();
    }catch(err){
      console.warn(err);
      const res = await fetch('../docs/proces-operacyjny.md');
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      processDoc = await res.text();
    }
  }catch(err){
    console.warn(err);
    toast(`Nie udało się wczytać Procesu — ${err?.message || 'zostaje treść awaryjna'}`);
  }
  render();
}

init();
